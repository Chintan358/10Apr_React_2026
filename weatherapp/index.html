<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Style -->
    <style>
        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .weather-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .weather-card h1 {
            font-size: 20px;
            margin: 10px 0;
        }

        .title {
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .btn-custom {
            background: #4facfe;
            color: white;
            border-radius: 25px;
        }

        .btn-custom:hover {
            background: #00c6ff;
        }

        input {
            border-radius: 25px !important;
        }

        .icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
    </style>

    <script src="myapp.js"></script>
</head>

<body>

    <div class="weather-card">
        <div class="icon">🌤️</div>
        <h3 class="title">Weather App</h3>

        <div class="input-group mb-3">
            <input type="text" id="location" class="form-control" placeholder="Enter city name">
            <button class="btn btn-custom" onclick="getWeather()">Search</button>
        </div>

        <hr>

        <h1>📍 <span id="city">--</span></h1>
        <h1>🌡️ Temp: <span id="temp">--</span> °C</h1>
        <h1>ضغط Pressure: <span id="pressure">--</span></h1>
        <h1>💧 Humidity: <span id="humidity">--</span>%</h1>
    </div>

</body>

</html>
